services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
    environment:
      - MODELS_DIR=/app/models

  frontend:
    build:
      context: ./frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_MODE=http
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
